<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada | Portal de la Llama</title>
  <link rel="stylesheet" href="estilo.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Special+Elite&display=swap" rel="stylesheet">
  <style>
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; }
    .error-box { max-width: 600px; padding: 3rem; background: var(--fondo-caja); border: 2px solid var(--acento); border-radius: 8px; }
    h1 { font-family: 'Cinzel', serif; color: var(--brillo); font-size: 3rem; margin-bottom: 1rem; }
    p { font-family: 'Special Elite', cursive; color: var(--texto); font-size: 1.2rem; margin-bottom: 2rem; }
    a { color: var(--acento); text-decoration: none; border: 1px solid var(--acento); padding: 0.8rem 1.5rem; border-radius: 4px; transition: 0.3s; }
    a:hover { background: var(--acento); color: var(--fondo); }
  </style>
</head>
<body>
  <div class="error-box">
    <h1>404</h1>
    <p>El camino que buscaste no está aquí...<br>pero la renovación te espera de vuelta al inicio.</p>
    <a href="/">Volver al Portal</a>
  </div>
</body>
</html>
